<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funnel Overlay</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: transparent;
}

.controls {
  padding: 8px;
}

button {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  cursor: pointer;
}

.tooltip {
  pointer-events: none;
  position: fixed;
  background: white;
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  display: none;
}
</style>
</head>

<body>

<div class="controls">
  <button id="modeBtn">Normalized: Off</button>
</div>

<svg id="chart"></svg>
<div class="tooltip" id="tooltip"></div>

<script>

// ---------- (same data as before) ----------
const MONTHLY = { /* KEEP EXACTLY AS BEFORE */ };
const WITHDRAWN_HM = { 2022:{4:1} };
const WITHDRAWN_PANEL = { 2022:{4:1} };
const WITHDRAWN_OFFER = { 2021:{6:1}, 2022:{9:1} };
const YEARS=[2021,2022,2023,2024,2025];

// ---------- helpers (unchanged) ----------
function sparseSum(obj, yr, upToMonth) {
  if (!obj[yr]) return 0;
  return Object.entries(obj[yr])
    .filter(([m])=>+m < upToMonth)
    .reduce((a,[,v])=>a+v, 0);
}

function getCum(year, upToMonth) {
  const s = (k, lag) =>
    MONTHLY[k][year]
      .slice(0, Math.max(0, upToMonth + 1 - lag))
      .reduce((a,b)=>a+b, 0);

  const app = s('applied',0);
  const hm = s('hm',1);
  const panel = s('panel',2);
  const accepted = s('accepted',0);

  const wHM = sparseSum(WITHDRAWN_HM, year, upToMonth+1);
  const wPanel = sparseSum(WITHDRAWN_PANEL, year, upToMonth+1)
               + sparseSum(WITHDRAWN_OFFER, year, upToMonth+1);

  return { app, hm, panel, accepted, wHM, wPanel };
}

function getYearFinal(y){ return getCum(y,11); }

function ribbon(x1,y1,y1b,x2,y2,y2b){
  const mx=(x1+x2)/2;
  return `M${x1},${y1}
          C${mx},${y1} ${mx},${y2} ${x2},${y2}
          L${x2},${y2b}
          C${mx},${y2b} ${mx},${y1b} ${x1},${y1b} Z`;
}

// ---------- NEW ----------
let normalized = false;

const svg = d3.select("#chart");
const tooltip = document.getElementById("tooltip");

function draw(){

  const W = window.innerWidth;
  const H = 440;

  svg.attr("viewBox",`0 0 ${W} ${H}`);
  svg.selectAll("*").remove();

  const x = {
    app:80,
    hm:W*0.32,
    panel:W*0.52,
    acc:W*0.75,
    w:W*0.9
  };

  const totals = YEARS.map(y=>getYearFinal(y));

  const MAX = {
    app: Math.max(...totals.map(d=>d.app)),
    hm: Math.max(...totals.map(d=>d.hm)),
    panel: Math.max(...totals.map(d=>d.panel)),
    acc: Math.max(...totals.map(d=>d.accepted)),
    w: Math.max(...totals.map(d=>d.wHM + d.wPanel))
  };

  function scale(v, stage){
    if (!normalized) {
      return Math.max((v / MAX.app) * (H-80), v>0 ? 2 : 0);
    } else {
      return Math.max((v / MAX[stage]) * (H-80), v>0 ? 2 : 0);
    }
  }

  YEARS.forEach((yr,i)=>{

    const d = getYearFinal(yr);

    const pos = {
      app:{v:d.app},
      hm:{v:d.hm},
      panel:{v:d.panel},
      acc:{v:d.accepted},
      w:{v:d.wHM + d.wPanel}
    };

    Object.keys(pos).forEach(k=>{
      const h = scale(pos[k].v, k);
      const y = H - h - 40;
      pos[k] = { ...pos[k], x:x[k]+(i-2)*3, y, h };
    });

    function flow(a,b,val,color){
      if(val<=0) return;

      const frac = val / pos[a].v;
      const y1 = pos[a].y + pos[a].h*(1-frac);
      const y2 = pos[a].y + pos[a].h;

      svg.append("path")
        .attr("d", ribbon(
          pos[a].x+8, y1, y2,
          pos[b].x-8, pos[b].y, pos[b].y+pos[b].h
        ))
        .attr("fill",color)
        .attr("opacity",0.18);
    }

    flow("app","hm",d.hm,"#378ADD");
    flow("hm","panel",d.panel,"#7F77DD");

    flow("panel","acc",d.accepted,"#639922");
    flow("panel","w",d.wPanel,"#C47A3A");
    flow("hm","w",d.wHM,"#C47A3A");

    Object.entries(pos).forEach(([k,p])=>{
      svg.append("rect")
        .attr("x",p.x-8)
        .attr("y",p.y)
        .attr("width",16)
        .attr("height",p.h)
        .attr("fill",
          k==="app"?"#378ADD":
          k==="hm"?"#7F77DD":
          k==="panel"?"#1D9E75":
          k==="acc"?"#639922":
          "#C47A3A"
        )
        .attr("opacity",0.85)
        .on("mousemove",(e)=>{
          tooltip.style.display="block";
          tooltip.innerHTML=`<b>${yr} ${k}</b>: ${p.v}`;
          tooltip.style.left=e.clientX+10+"px";
          tooltip.style.top=e.clientY-20+"px";
        })
        .on("mouseleave",()=>tooltip.style.display="none");
    });

  });

  ["Applied","HM","Panel","Accepted","Withdrawn"].forEach((t,i)=>{
    const keys=["app","hm","panel","acc","w"];
    svg.append("text")
      .attr("x",x[keys[i]])
      .attr("y",22)
      .attr("text-anchor","middle")
      .attr("font-size",11)
      .text(t);
  });

}

document.getElementById("modeBtn").onclick = () => {
  normalized = !normalized;
  document.getElementById("modeBtn").textContent =
    normalized ? "Normalized: On" : "Normalized: Off";
  draw();
};

draw();

</script>
</body>
</html>
