<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Funnel Overlay</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: transparent;
  --text: #2a2a28;
  --muted: #7a7a76;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: transparent;
  color: var(--text);
}

.controls {
  display: flex;
  gap: 8px;
  padding: 10px;
  align-items: center;
}

.tog {
  font-size: 11px;
  padding: 3px 9px;
  border: 1px solid #ccc;
  border-radius: 6px;
  cursor: pointer;
  background: #f5f5f3;
}

.tooltip {
  position: fixed;
  pointer-events: none; /* FIXES JITTER */
  background: white;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  display: none;
}

svg { width: 100%; }
</style>
</head>

<body>

<div class="controls">
  Toggle year
  <button class="tog on" data-y="2021">2021</button>
  <button class="tog on" data-y="2022">2022</button>
  <button class="tog on" data-y="2023">2023</button>
  <button class="tog on" data-y="2024">2024</button>
  <button class="tog on" data-y="2025">2025</button>
</div>

<svg id="chart"></svg>
<div class="tooltip" id="tooltip"></div>

<script>

const YEARS = [2021,2022,2023,2024,2025];

const DATA = {
  app:{2021:164,2022:304,2023:322,2024:344,2025:344},
  hm:{2021:7,2022:6,2023:9,2024:6,2025:10},
  panel:{2021:2,2022:3,2023:5,2024:3,2025:5},
  acc:{2021:0,2022:1,2023:0,2024:0,2025:0},
  w:{2021:1,2022:2,2023:0,2024:0,2025:0}
};

const COLORS = {
  app:"#378ADD",
  hm:"#7F77DD",
  panel:"#1D9E75",
  acc:"#639922",
  w:"#C47A3A"
};

const svg = d3.select("#chart");
const tooltip = document.getElementById("tooltip");

let visible = new Set(YEARS.map(String));

function ribbon(x1,y1,y1b,x2,y2,y2b){
  const mx=(x1+x2)/2;
  return `M${x1},${y1}
          C${mx},${y1} ${mx},${y2} ${x2},${y2}
          L${x2},${y2b}
          C${mx},${y2b} ${mx},${y1b} ${x1},${y1b} Z`;
}

function draw(){

  const W = document.body.clientWidth;
  const H = 420;

  svg.attr("viewBox",`0 0 ${W} ${H}`);

  svg.selectAll("*").remove();

  const x = {
    app: 80,
    hm: W*0.3,
    panel: W*0.5,
    acc: W*0.75,
    w: W*0.9
  };

  const max = Math.max(...Object.values(DATA.app));

  function scale(v){
    return (v/max)*(H-80);
  }

  YEARS.forEach((yr,i)=>{

    if(!visible.has(String(yr))) return;

    const offset = (i-2)*3;

    const v = {
      app:DATA.app[yr],
      hm:DATA.hm[yr],
      panel:DATA.panel[yr],
      acc:DATA.acc[yr],
      w:DATA.w[yr]
    };

    const pos={};

    Object.keys(v).forEach(k=>{
      const h = scale(v[k]);
      const y = H - h - 40;
      pos[k]={x:x[k]+offset,y,h};
    });

    function flow(a,b,color){
      if(v[a]===0||v[b]===0) return;

      svg.append("path")
        .attr("d", ribbon(
          pos[a].x+8, pos[a].y, pos[a].y+pos[a].h,
          pos[b].x-8, pos[b].y, pos[b].y+pos[b].h
        ))
        .attr("fill",color)
        .attr("opacity",0.15);
    }

    flow("app","hm",COLORS.app);
    flow("hm","panel",COLORS.hm);
    flow("panel","acc",COLORS.panel);
    flow("hm","w",COLORS.w);
    flow("panel","w",COLORS.w);

    Object.keys(pos).forEach(k=>{
      svg.append("rect")
        .attr("x",pos[k].x-8)
        .attr("y",pos[k].y)
        .attr("width",16)
        .attr("height",pos[k].h)
        .attr("fill",COLORS[k])
        .attr("opacity",0.7)
        .on("mousemove",(e)=>{
          tooltip.style.display="block";
          tooltip.innerHTML=`<b>${yr} ${k}</b>: ${v[k]}`;
          tooltip.style.left=e.clientX+10+"px";
          tooltip.style.top=e.clientY-20+"px";
        })
        .on("mouseleave",()=>tooltip.style.display="none");
    });

  });

  ["Applied","HM","Panel","Accepted","Withdrawn"].forEach((t,i)=>{
    const keys=["app","hm","panel","acc","w"];
    svg.append("text")
      .attr("x",x[keys[i]])
      .attr("y",20)
      .attr("text-anchor","middle")
      .attr("font-size",11)
      .text(t);
  });

}

document.querySelectorAll(".tog").forEach(btn=>{
  btn.onclick=()=>{
    const y=btn.dataset.y;
    if(visible.has(y)){visible.delete(y);btn.style.opacity=0.3;}
    else{visible.add(y);btn.style.opacity=1;}
    draw();
  };
});

draw();

</script>
</body>
</html>
